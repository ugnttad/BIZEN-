<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1767ff" />
    <title>BIZEN Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, rgba(23, 103, 255, 0.08), #ffffff 44%, rgba(8, 182, 255, 0.08));
        color: #060b45;
      }
      main {
        width: min(88vw, 380px);
        border: 1px solid rgba(205, 221, 255, 0.9);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(23, 36, 99, 0.14);
      }
      img {
        width: 64px;
        height: 64px;
        border-radius: 18px;
      }
      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.65;
      }
      a {
        display: inline-flex;
        margin-top: 22px;
        border-radius: 14px;
        background: linear-gradient(135deg, #1767ff, #22a8ff 70%, #5b6cff);
        color: white;
        padding: 12px 16px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/bizen-icon-192.png" alt="BIZEN" />
      <h1>Dang mat ket noi</h1>
      <p>BIZEN da luu san khung ung dung. Ket noi lai internet de dong bo cham cong, checklist, lich ca va bang luong moi nhat.</p>
      <a href="/mobile/home">Thu lai</a>
    </main>
  </body>
</html>
